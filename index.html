<title>🏠 Contas de Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f3460 100%); padding: 20px; border-bottom: 3px solid #f97316; }
  .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 800; color: white; }
  .header-sub { font-size: 12px; color: #93c5fd; margin-top: 2px; }
  .mes-badge { background: #f97316; color: white; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px; }

  .tabs { background: #0f3460; border-bottom: 1px solid #1e4d8c; }
  .tabs-inner { max-width: 600px; margin: 0 auto; display: flex; }
  .tab-btn { flex: 1; background: transparent; border: none; border-bottom: 3px solid transparent; color: #93c5fd; padding: 13px 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; text-align: center; }
  .tab-btn.active { border-bottom-color: #f97316; color: #fbbf24; background: #16213e; }

  .content { max-width: 600px; margin: 0 auto; padding: 18px 16px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .total-card { background: linear-gradient(135deg, #0f3460, #1e3a5f); border-radius: 16px; padding: 18px; margin-bottom: 16px; border: 1px solid #1e4d8c; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .total-label { font-size: 10px; color: #93c5fd; text-transform: uppercase; letter-spacing: 1px; }
  .total-value { font-size: 26px; font-weight: 800; color: white; margin-top: 2px; }
  .total-cada .label { font-size: 10px; color: #93c5fd; text-transform: uppercase; letter-spacing: 1px; text-align: right; }
  .total-cada .value { font-size: 22px; font-weight: 800; color: #fbbf24; margin-top: 2px; text-align: right; }

  .prog-box { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; box-shadow: 0 1px 6px #0001; border: 1px solid #e2e8f0; }

  .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .btn-add { background: #f97316; color: white; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }

  .conta-card { background: white; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 4px #0001; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: all 0.2s; }

  .conta-left { display: flex; align-items: center; gap: 10px; }

  .conta-nome { font-size: 13px; font-weight: 600; color: #1e293b; }

  .conta-status { font-size: 10px; color: #94a3b8; }
  .conta-card.pago .conta-status { color: #22c55e; font-weight: 600; }
  .conta-right { display: flex; align-items: center; gap: 8px; }
  .conta-valor { font-size: 15px; font-weight: 700; color: #0f3460; }
  .conta-card.pago .conta-valor { color: #22c55e; }
  .btn-check { background: none; border: 2px solid #e2e8f0; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.2s; }
  .conta-card.pago .btn-check { background: #22c55e; border-color: #22c55e; color: white; }
  .btn-del { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 14px; }
  .btn-del:hover { color: #ef4444; }
  .btn-edit { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 14px; }
  .btn-edit:hover { color: #f97316; }

  .pessoas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pessoa-card { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px #0001; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; }
  .pessoa-card.pago { background: #f0fdf4; border-color: #bbf7d0; }
  .pessoa-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: white; margin-bottom: 8px; }
  .av0 { background: #0f3460; } .av1 { background: #7c3aed; } .av2 { background: #0369a1; } .av3 { background: #f97316; } .av4 { background: #059669; } .av5 { background: #dc2626; }

  .tag-ok { background: #dcfce7; color: #16a34a; }
  .pessoa-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }

  /* GERENCIAR */
  .ger-card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; box-shadow: 0 1px 4px #0001; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; gap: 8px; }

  .ger-valor { font-size: 15px; font-weight: 700; color: #0f3460; }

  .btn-ger-edit { background: #f9731622; color: #f97316; border: 1px solid #f9731644; border-radius: 7px; padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .btn-ger-del { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; border-radius: 7px; padding: 5px 10px; font-size: 11px; cursor: pointer; }

  /* HISTÓRICO */
  .hist-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 4px #0001; border: 1px solid #e2e8f0; }
  .hist-header { background: linear-gradient(90deg, #0f3460, #1e3a5f); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .hist-mes { font-size: 14px; font-weight: 700; color: #fbbf24; }
  .hist-total { font-size: 13px; color: #93c5fd; }
  .hist-body { display: none; padding: 14px 16px; }
  .hist-body.open { display: block; }
  .hist-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .hist-row:last-child { border: none; }
  .hist-pessoas { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .hist-pessoa-chip { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .chip-ok { background: #dcfce7; color: #16a34a; }
  .chip-nao { background: #fef3c7; color: #d97706; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 9999; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px #0003; overflow: hidden; }
  .modal-hdr { background: linear-gradient(90deg,#0f3460,#1e3a5f); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f97316; }
  .modal-hdr h3 { font-size: 14px; font-weight: 700; color: #fbbf24; }
  .modal-x { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; }
  .modal-body { padding: 18px; }
  .mlabel { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
  .minput { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 9px 12px; font-size: 14px; color: #1e293b; outline: none; margin-bottom: 12px; font-family: 'Inter', sans-serif; }
  .minput:focus { border-color: #0f3460; }
  .modal-ftr { padding: 12px 18px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { background: #f1f5f9; color: #64748b; border: none; border-radius: 8px; padding: 9px 16px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-save { background: #f97316; color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 12px; font-weight: 700; cursor: pointer; }

  .toast { position: fixed; top: 14px; right: 14px; z-index: 99999; background: #1e293b; border: 1px solid #f97316; border-radius: 10px; padding: 9px 14px; font-size: 12px; color: white; box-shadow: 0 4px 20px #0002; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; }

  /* LIGHT MODE */
  body.light { background: #f1f5f9; }
  body.light .conta-card { background: white; border-color: #e2e8f0; }
  body.light .conta-card.pago { background: #f0fdf4; border-color: #bbf7d0; }
  body.light .prog-box { background: white; border-color: #e2e8f0; }
  body.light .ger-card { background: white; border-color: #e2e8f0; }
  body.light .hist-card { background: white; border-color: #e2e8f0; }
  body.light .modal { background: white; }
  body.light .minput { background: #f8fafc; border-color: #e2e8f0; color: #1e293b; }
  body.light .pessoa-card { background: white; border-color: #e2e8f0; }
  body.light .pessoa-card.pago { background: #f0fdf4; border-color: #bbf7d0; }

  /* DARK MODE */

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, enableNetwork } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCxyYBAxVKbFUhK-73SU08VsGf5Az3HpG4",
  authDomain: "contas-de-casa-8d41f.firebaseapp.com",
  projectId: "contas-de-casa-8d41f",
  storageBucket: "contas-de-casa-8d41f.firebasestorage.app",
  messagingSenderId: "344992597601",
  appId: "1:344992597601:web:0dafb94725306a75c30c20"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
enableNetwork(db);

// Documento principal — dados sem fotos
const DOC_REF = doc(db, 'contascasa', 'dados');
// Documento separado — só fotos das pessoas
const FOTOS_REF = doc(db, 'contascasa', 'fotos');

let ultimoSave = 0;
let salvando = false;
let primeiraVez = true;

onSnapshot(DOC_REF, (snap) => {
  const fbDados = snap.exists() ? snap.data() : {};
  window.fbData = fbDados;

  if (primeiraVez) {
    primeiraVez = false;
    // Carrega fotos separadamente
    window.fbReady = true;
    document.dispatchEvent(new Event('firebase-ready'));
    return;
  }

  if (Date.now() - ultimoSave > 3000 && fbDados['dados']) {
    try {
      const nd = JSON.parse(fbDados['dados']);
      if (typeof window.syncFromCloud === 'function') window.syncFromCloud(nd);
    } catch(e) {}
  }
}, (error) => {
  window.fbData = {};
  window.fbReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
});

// Listener para fotos — atualiza fotos das pessoas em tempo real
onSnapshot(FOTOS_REF, (snap) => {
  if (snap.exists()) {
    window.fbFotos = snap.data().fotos || {};
    // Aplica fotos nas pessoas se o app já carregou
    if (typeof window.aplicarFotos === 'function') window.aplicarFotos();
  }
});

window.saveToFirebase = async function(data) {
  if (salvando) return;
  try {
    salvando = true;
    ultimoSave = Date.now();
    // Separa fotos das pessoas antes de salvar
    const dataParaSalvar = JSON.parse(JSON.stringify(data));
    const fotosMap = {};
    dataParaSalvar.pessoas = dataParaSalvar.pessoas.map(p => {
      if (p.foto) { fotosMap[p.id] = p.foto; delete p.foto; }
      return p;
    });
    // Remove fotos do histórico também
    dataParaSalvar.historico = dataParaSalvar.historico.map(h => {
      h.pessoas = (h.pessoas||[]).map(p => { if(p.foto) delete p.foto; return p; });
      return h;
    });
    // Salva dados sem fotos
    await setDoc(DOC_REF, { dados: JSON.stringify(dataParaSalvar) }, { merge: true });
    // Salva fotos separadamente se houver
    if (Object.keys(fotosMap).length > 0) {
      const fotosAtuais = window.fbFotos || {};
      const novasFotos = {...fotosAtuais, ...fotosMap};
      await setDoc(FOTOS_REF, { fotos: novasFotos }, { merge: true });
      window.fbFotos = novasFotos;
    }
  } catch(e) {
    console.log('Firebase save error:', e);
  } finally {
    salvando = false;
  }
};

window.loadFromFirebase = function() {
  if (window.fbData && window.fbData['dados']) {
    try {
      const d = JSON.parse(window.fbData['dados']);
      // Restaura fotos nas pessoas (Firebase > embutidas)
      const fotos = window.fbFotos || {};
      const embutidas = window.fotosEmbutidas || {};
      d.pessoas = (d.pessoas||[]).map(p => {
        p.foto = fotos[p.id] || embutidas[p.nome] || p.foto;
        return p;
      });
      return d;
    } catch {}
  }
  return null;
};

window.aplicarFotos = function() {
  if (typeof dados === 'undefined' || !dados.pessoas) return;
  const fotos = window.fbFotos || {};
  let alterou = false;
  dados.pessoas = dados.pessoas.map(p => {
    // Prioridade: Firebase > embutida
    const fotoFb = fotos[p.id];
    const fotoEmbutida = window.fotosEmbutidas[p.nome];
    const melhorFoto = fotoFb || fotoEmbutida;
    if (melhorFoto && p.foto !== melhorFoto) { p.foto = melhorFoto; alterou = true; }
    return p;
  });
  if (alterou && typeof render === 'function') render();
};

<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>🏠 Contas de Casa</h1>
      <div class="header-sub" id="header-mes">—</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px"><button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button><div class="mes-badge" id="mes-badge">—</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="showTab('inicio',this)">🏠 Início</button>
    <button class="tab-btn" onclick="showTab('historico',this)">📜 Histórico</button>
    <button class="tab-btn" onclick="showTab('gerenciar',this)">✏️ Gerenciar</button>
  </div>
</div>

<div class="content">

  <!-- ABA INÍCIO -->
  <div id="tab-inicio" class="tab-panel active">
    <div class="total-card">
      <div>
        <div class="total-label">Total do mês</div>
        <div class="total-value" id="total-geral">R$ 0,00</div>
      </div>
      <div class="total-cada">
        <div class="label">Cada um paga</div>
        <div class="value" id="total-cada">R$ 0,00</div>
      </div>
    </div>

    <div class="prog-box">
      <div class="prog-header">
        <div class="prog-title">Progresso de pagamentos</div>
        <div class="prog-pct" id="prog-pct">0%</div>
      </div>
      <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
      <div class="prog-sub" id="prog-sub">0 de 0 pessoas pagaram</div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">💡 Contas do Mês</div>
      </div>
      <div id="contas-lista"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">👥 Divisão por Pessoa</div>
      </div>
      <div class="pessoas-grid" id="pessoas-grid"></div>
    </div>

    <button class="btn-novo-mes" id="btn-novo-mes" onclick="novoMes()">🔄 Fechar Mês e Iniciar Novo</button>
  </div>

  <!-- ABA GERENCIAR -->
  <div id="tab-gerenciar" class="tab-panel">
    <div id="ger-novo-mes-banner"></div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">💡 Contas Fixas</div>
        <button class="btn-add" onclick="abrirModalConta()">+ Adicionar</button>
      </div>
      <div id="ger-contas"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">👥 Moradores</div>
        <button class="btn-add" onclick="abrirModalPessoa()">+ Adicionar</button>
      </div>
      <div id="ger-pessoas"></div>
    </div>
  </div>

  <!-- ABA HISTÓRICO -->
  <div id="tab-historico" class="tab-panel">
    <div id="historico-lista"></div>
  </div>

</div>

<!-- MODAL CONTA -->
<div class="modal-overlay" id="modal-conta">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modal-conta-titulo">➕ Nova Conta</h3>
      <button class="modal-x" onclick="fecharModal('modal-conta')">✕</button>
    </div>
    <div class="modal-body">
      <label class="mlabel">Nome da conta</label>
      <input class="minput" type="text" id="input-conta-nome" placeholder="Ex: Internet, Energia..."/>
      <label class="mlabel">Valor (R$)</label>
      <input class="minput" type="number" id="input-conta-valor" step="0.01" placeholder="Ex: 150.00"/>
      <label class="mlabel">Ícone</label>
      <select class="minput" id="input-conta-icon">
        <option value="📶">📶 Internet</option>
        <option value="⚡">⚡ Energia</option>
        <option value="💧">💧 Água</option>
        <option value="🔥">🔥 Gás</option>
        <option value="🏠">🏠 Condomínio</option>
        <option value="📺">📺 TV/Streaming</option>
        <option value="🧹">🧹 Limpeza</option>
        <option value="🛒">🛒 Mercado</option>
        <option value="💡">💡 Outro</option>

    <div class="modal-ftr">
      <button class="btn-cancel" onclick="fecharModal('modal-conta')">Cancelar</button>
      <button class="btn-save" onclick="salvarConta()">Salvar</button>

  </div>
</div>

  <div class="modal">
    <div class="modal-hdr">
      <h3>➕ Novo Morador</h3>

      <label class="mlabel">Nome</label>
      <input class="minput" type="text" id="input-pessoa-nome" placeholder="Ex: João, Maria..."/>
      <label class="mlabel">WhatsApp (com DDD)</label>
      <input class="minput" type="tel" id="input-pessoa-fone" placeholder="Ex: 11999998888"/>
    </div>
    <div class="modal-ftr">
      <button class="btn-cancel" onclick="fecharModal('modal-pessoa')">Cancelar</button>
      <button class="btn-save" onclick="salvarPessoa()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'contas_casa_v2';
const MESES_NOMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const AV_COLORS = ['av0','av1','av2','av3','av4','av5'];

const DEFAULTS = {
  contas: [
    { id:1, nome:"Internet", valor:132.36, icon:"📶", pago:false },
    { id:2, nome:"Energia Solar", valor:198.66, icon:"⚡", pago:false },
    { id:3, nome:"Água", valor:30.89, icon:"💧", pago:false },
  ],
  pessoas: [
    { id:1, nome:"Natanael", pago:false },
    { id:2, nome:"Claudia", pago:false },
    { id:3, nome:"Moises", pago:false },
    { id:4, nome:"Miqueias", pago:false },
  ],
  historico: [],
  nextId: 10,
  mesFechado: false
};

let dados = {};
let editContaId = null;

let dadosVieramDoFirebase = false;

function load() {
  try {
    const fbDados = window.loadFromFirebase ? window.loadFromFirebase() : null;
    if (fbDados && fbDados.contas) {
      dados = fbDados;
      dadosVieramDoFirebase = true;
      try { localStorage.setItem(SK, JSON.stringify(dados)); } catch {}
    } else {
      dados = JSON.parse(JSON.stringify(DEFAULTS));
      dadosVieramDoFirebase = false;
    }
  } catch { dados = JSON.parse(JSON.stringify(DEFAULTS)); dadosVieramDoFirebase = false; }
  if (!dados.historico) dados.historico = [];
  if (dados.mesFechado === undefined) dados.mesFechado = false;
}

// Sync when another device makes changes
window.syncFromCloud = function(newDados) {
  if (!newDados || !newDados.contas) return;
  dados = newDados;
  render();
  renderHistorico();
};
function save() {
  try { localStorage.setItem(SK, JSON.stringify(dados)); } catch {}
  window.dadosGlobais = dados;
  if (window.saveToFirebase) window.saveToFirebase(dados);
}
function fmt(v) { return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('click', e => {
  ['modal-conta','modal-pessoa'].forEach(id => { const el=document.getElementById(id); if(el&&e.target===el) el.classList.remove('open'); });
});

function showTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='gerenciar') renderGer();
  if(name==='historico') renderHistorico();
}

function updateHeader() {
  const now = new Date();
  const diasSemana = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const diaSemana = diasSemana[now.getDay()];
  const dia = now.getDate();
  const mes = MESES_NOMES[now.getMonth()];
  const ano = now.getFullYear();
  document.getElementById('header-mes').textContent = diaSemana + ', ' + dia + ' de ' + mes + ' de ' + ano;
  // Badge mostra o mês atual do app (pode ser o próximo mês após fechar)
  const badgeMes = dados.mesAtual ? dados.mesAtual.mes : now.getMonth();
  const badgeAno = dados.mesAtual ? dados.mesAtual.ano : now.getFullYear();
  document.getElementById('mes-badge').textContent = MESES_NOMES[badgeMes].substring(0,3)+'/'+String(badgeAno).substring(2);
}

function render() {
  const total = dados.contas.reduce((s,c)=>s+c.valor,0);
  const cada = dados.pessoas.length>0 ? total/dados.pessoas.length : 0;
  document.getElementById('total-geral').textContent = fmt(total);
  document.getElementById('total-cada').textContent = fmt(cada);

  const pagos = dados.pessoas.filter(p=>p.pago).length;
  const pct = dados.pessoas.length>0 ? Math.round((pagos/dados.pessoas.length)*100) : 0;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-bar').style.width = pct+'%';

function renderHistorico() {
  const hl = document.getElementById('historico-lista');
  if (dados.historico.length===0) {
    hl.innerHTML = '<div class="empty" style="padding:40px">📭 Nenhum mês registrado ainda.<br>Clique em "Fechar Mês" para começar!</div>';
    return;
  }

  const reversed = dados.historico.map((h,i)=>({...h, originalIdx:i})).reverse();

  // --- GRÁFICO DE EVOLUÇÃO ---
  const anoParaGrafico = window.anoResumoSelecionado || String(new Date().getFullYear());
  const chartData = [...dados.historico].filter(h => h.mes.split('/')[1].trim() === anoParaGrafico);
  const maxVal = Math.max(...chartData.map(h=>h.total), 1);
  const chartBars = chartData.map(h => {
    const pct = Math.round((h.total / maxVal) * 100);
    const label = h.mes.split('/')[0].substring(0,3);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="font-size:10px;color:#fbbf24;font-weight:700">${fmt(h.total).replace('R$','')}</div>
      <div style="width:100%;background:#1e4d8c;border-radius:6px 6px 0 0;height:80px;display:flex;align-items:flex-end">
        <div style="width:100%;background:linear-gradient(180deg,#f97316,#fbbf24);border-radius:6px 6px 0 0;height:${pct}%;transition:height 0.5s;min-height:4px"></div>
      </div>
      <div style="font-size:10px;color:#93c5fd;font-weight:600">${label}</div>
    </div>`;
  }).join('');

  // --- RESUMO ANUAL ---
  const anoAtual = new Date().getFullYear();
  const anosDisponiveis = [...new Set(dados.historico.map(h => h.mes.split('/')[1].trim()))].sort();
  const anoSelecionado = window.anoResumoSelecionado || String(anoAtual);
  const mestsAno = dados.historico.filter(h => h.mes.split('/')[1].trim() === anoSelecionado);
  const totalAno = mestsAno.reduce((s,h)=>s+h.total, 0);

  const pessoasMap = {};
  mestsAno.forEach(h => {
    h.pessoas.forEach(p => {
      // Busca foto: histórico > moradores atuais > embutidas (sem foto para 2024)
      const fotoAtual = (dados.pessoas.find(mp=>mp.nome===p.nome)||{}).foto;
      const fotoEmbutida = (window.fotosEmbutidas||{})[p.nome];
      const foto = anoSelecionado === '2024' ? null : (p.foto || fotoAtual || fotoEmbutida);
      if (!pessoasMap[p.nome]) pessoasMap[p.nome] = { nome: p.nome, foto, total: 0, meses: 0, pagou: 0 };
      pessoasMap[p.nome].total += h.cada || 0;
      pessoasMap[p.nome].meses += 1;
      if (p.pago) pessoasMap[p.nome].pagou += 1;
      if (foto) pessoasMap[p.nome].foto = foto;
    });
  });
  const pessoasAno = Object.values(pessoasMap);

  const seletorAnos = anosDisponiveis.length > 1 ? `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${anosDisponiveis.map(a => `
        <button onclick="window.anoResumoSelecionado='${a}';renderHistorico()" 
          style="padding:4px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;
          background:${a===anoSelecionado?'#f97316':'#ffffff20'};color:${a===anoSelecionado?'white':'#93c5fd'}">
          ${a}
        </button>`).join('')}
    </div>` : '';

  const resumoAnual = pessoasAno.length > 0 ? `
    <div style="background:linear-gradient(135deg,#0f3460,#1e3a5f);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #1e4d8c">
      <div style="font-size:11px;color:#93c5fd;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">📅 Resumo ${anoSelecionado}</div>
      ${seletorAnos}
      <div style="font-size:22px;font-weight:800;color:white;margin-bottom:12px">${fmt(totalAno)} <span style="font-size:13px;color:#93c5fd;font-weight:400">no ano</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${pessoasAno.map(p => `
          <div style="background:#ffffff15;border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px">
            ${p.foto
              ? `<img src="${p.foto}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #f97316">`
              : `<div style="width:34px;height:34px;border-radius:50%;background:#f97316;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800;flex-shrink:0">${p.nome[0].toUpperCase()}</div>`
            }
            <div>
              <div style="font-size:12px;font-weight:700;color:white">${p.nome}</div>
              <div style="font-size:13px;font-weight:800;color:#fbbf24">${fmt(p.total)}</div>
              <div style="font-size:10px;color:#93c5fd">${p.pagou}/${p.meses} meses em dia</div>
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  const grafico = chartData.length >= 2 ? `
    <div style="background:linear-gradient(135deg,#0f3460,#1e3a5f);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #1e4d8c">
      <div style="font-size:11px;color:#93c5fd;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">📊 Evolução dos gastos</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:120px;padding-bottom:0">
        ${chartBars}
      </div>
    </div>` : '';

  const reversedFiltrado = reversed.filter(h => h.mes.split('/')[1].trim() === anoSelecionado);
  hl.innerHTML = grafico + resumoAnual + reversedFiltrado.map((h,i)=>`
    <div class="hist-card">
      <div class="hist-header" onclick="toggleHist('hist-${i}')">
        <div>
          <div class="hist-mes">${h.mes}</div>
          <div class="hist-total">Total: ${fmt(h.total)} · ${fmt(h.cada)} por pessoa</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="event.stopPropagation();deletarHistorico(${h.originalIdx})" 
            style="background:#ef444422;color:#ef4444;border:1px solid #ef444444;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer">
            🗑 Apagar
          </button>
          <div style="color:#93c5fd;font-size:18px">▼</div>
        </div>
      </div>
      <div class="hist-body" id="hist-${i}">
        <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Contas</div>
        ${h.contas.map(c=>`
          <div class="hist-row">
            <span style="color:#1e293b">${c.icon} ${c.nome} ${c.pago ? '<span style="color:#22c55e;font-size:11px;font-weight:700">✅ Paga</span>' : '<span style="color:#f97316;font-size:11px;font-weight:700">⏳ Pendente</span>'}</span>
            <span style="color:#0f3460;font-weight:600">${fmt(c.valor)}</span>
          </div>`).join('')}
        <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin:10px 0 8px">Pagamentos</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${h.pessoas.map(p=>`
            <div style="display:flex;align-items:center;gap:8px;background:${p.pago?'#f0fdf4':'#fff7ed'};border:1px solid ${p.pago?'#bbf7d0':'#fed7aa'};border-radius:10px;padding:8px 10px">
              ${(()=>{const is2024=h.mes&&h.mes.includes('/2024');const f=is2024?null:p.foto||(dados.pessoas.find(mp=>mp.nome===p.nome)||{}).foto||((window.fotosEmbutidas||{})[p.nome]);return f?`<img src="${f}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0">`:`<div style="width:32px;height:32px;border-radius:50%;background:#0f3460;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:800;flex-shrink:0">${p.nome[0].toUpperCase()}</div>`})()}
              <div>
                <div style="font-size:12px;font-weight:700;color:${p.pago?'#166534':'#92400e'}">${p.nome}</div>
                <div style="font-size:10px;color:${p.pago?'#22c55e':'#f97316'};font-weight:600">${p.pago?'✅ Pagou':'⏳ Pendente'}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`).join('') + `
    <button onclick="abrirModalMesManual()" style="width:100%;background:#0f346022;color:#93c5fd;border:1px solid #1e4d8c;border-radius:12px;padding:10px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px">
      📅 Adicionar mês manualmente
    </button>
    <button onclick="resetarTudo()" style="width:100%;background:transparent;color:#ef4444;border:1px solid #ef444444;border-radius:12px;padding:10px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px">
      🗑 Apagar todo o histórico
    </button>`;
}

function desbloquearMes() {
  dados.mesFechado = false;
  save(); render(); renderGer();
  showToast('🔓 Mês desbloqueado!');
}

function iniciarNovoMes() {
  if (!confirm('Iniciar novo mês? Os pagamentos serão zerados e os valores atualizados estarão valendo.')) return;
  dados.mesFechado = false;
  dados.contas.forEach(c=>c.pago=false);
  dados.pessoas.forEach(p=>p.pago=false);
  save(); render(); renderGer();
  showToast('🚀 Novo mês iniciado!');
}

function deletarHistorico(idx) {
  const h = dados.historico[idx];
  if (!confirm('Apagar o registro de "' + h.mes + '"?')) return;
  dados.historico.splice(idx, 1);
  dados.mesFechado = false; // Sempre desbloqueia ao apagar do histórico
  save(); // Salva PRIMEIRO
  render();
  renderHistorico();
  showToast('🗑 ' + h.mes + ' removido — você pode editar novamente!');
}

function toggleHist(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// CONTAS
function abrirModalConta() {
  editContaId = null;
  document.getElementById('modal-conta-titulo').textContent = '➕ Nova Conta';
  document.getElementById('input-conta-nome').value = '';
  document.getElementById('input-conta-valor').value = '';
  document.getElementById('input-conta-icon').value = '📶';
  abrirModal('modal-conta');
}

function abrirEditarConta(id) {
  const c = dados.contas.find(c=>c.id===id);
  if (!c) return;
  editContaId = id;
  document.getElementById('modal-conta-titulo').textContent = '✏️ Editar Conta';
  document.getElementById('input-conta-nome').value = c.nome;
  document.getElementById('input-conta-valor').value = c.valor;
  document.getElementById('input-conta-icon').value = c.icon;
  abrirModal('modal-conta');
}

function salvarConta() {
  const nome = document.getElementById('input-conta-nome').value.trim();
  const valor = parseFloat(document.getElementById('input-conta-valor').value);
  const icon = document.getElementById('input-conta-icon').value;
  if (!nome) { showToast('⚠️ Informe o nome'); return; }
  if (!valor||valor<=0) { showToast('⚠️ Informe um valor válido'); return; }
  if (editContaId) {
    const c = dados.contas.find(c=>c.id===editContaId);
    if (c) { c.nome=nome; c.valor=valor; c.icon=icon; }
    showToast('✅ Conta atualizada!');
  } else {
    dados.contas.push({ id:dados.nextId++, nome, valor, icon, pago:false });
    showToast('✅ '+nome+' adicionada!');
  }
  save(); fecharModal('modal-conta'); render(); renderGer();
}

function toggleConta(id) {
  if (dados.mesFechado) return;
  const c = dados.contas.find(c=>c.id===id);
  if (c) { c.pago=!c.pago; save(); render(); showToast(c.pago?'✅ '+c.nome+' paga!':'↩️ '+c.nome+' desmarcada'); }
}

function deletarConta(id) {
  const c = dados.contas.find(c=>c.id===id);
  if (!confirm('Remover "'+c.nome+'"?')) return;
  dados.contas = dados.contas.filter(c=>c.id!==id);
  save(); render(); renderGer(); showToast('🗑 Conta removida');
}

// PESSOAS
function abrirModalPessoa() {
  document.getElementById('input-pessoa-nome').value = '';
  document.getElementById('input-pessoa-fone').value = '';
  abrirModal('modal-pessoa');
}


function abrirModalMesManual() {
  const campos = dados.contas.map((c,i) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:16px">${c.icon}</span>
      <span style="font-size:12px;color:#94a3b8;flex:1">${c.nome}</span>
      <input class="minput" type="number" id="manual-conta-${i}" placeholder="0,00" step="0.01" style="width:100px;margin:0"/>
    </div>`).join('');
  document.getElementById('manual-contas-campos').innerHTML = campos;
  document.getElementById('input-mes-manual-pessoas').value = dados.pessoas.length;
  atualizarCamposExtras();
  abrirModal('modal-mes-manual');
}

function atualizarCamposExtras() {
  const nPessoas = parseInt(document.getElementById('input-mes-manual-pessoas').value) || 0;
  const nAtuais = dados.pessoas.length;
  const extras = nPessoas - nAtuais;
  const div = document.getElementById('manual-extras-nomes');
  if (!div) return;
  if (extras <= 0) { div.innerHTML = ''; return; }
  let html = '<div style="font-size:11px;color:#93c5fd;margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">Pessoas extras</div>';
  for (let i = 1; i <= extras; i++) {
    html += `<input class="minput" type="text" id="manual-extra-${i}" placeholder="Nome da pessoa extra ${i}" style="margin-bottom:6px"/>`;
  }
  div.innerHTML = html;
}

function salvarMesManual() {
  const mes = parseInt(document.getElementById('input-mes-manual-mes').value);
  const ano = parseInt(document.getElementById('input-mes-manual-ano').value);
  const nPessoas = parseInt(document.getElementById('input-mes-manual-pessoas').value);
  if (!nPessoas || nPessoas < 1) { showToast('⚠️ Preencha todos os campos'); return; }

  // Pega valores de cada conta
  const contasManual = dados.contas.map((c,i) => {
    const val = parseFloat(document.getElementById('manual-conta-'+i)?.value) || 0;
    return {...c, valor: val, pago: true};
  });
  const total = contasManual.reduce((s,c) => s + c.valor, 0);
  const cada = total / nPessoas;
  const mesNome = MESES_NOMES[mes] + '/' + ano;

  // Usa moradores atuais e preenche extras com nomes digitados
  const pessoas = dados.pessoas.slice(0, nPessoas).map(p => ({...p, pago: true}));
  let extra = 1;
  while (pessoas.length < nPessoas) {
    const nomeExtra = document.getElementById('manual-extra-'+(extra))?.value?.trim() || 'Pessoa extra '+extra;
    pessoas.push({id: Date.now()+pessoas.length, nome: nomeExtra, pago: true});
    extra++;
  }

  dados.historico.push({
    mes: mesNome, total, cada,
    contas: contasManual,
    pessoas,
    data: new Date(ano, mes, 1).toISOString(),
    manual: true
  });
  dados.historico.sort((a,b) => new Date(a.data) - new Date(b.data));
  save(); fecharModal('modal-mes-manual'); renderHistorico();
  showToast('✅ ' + mesNome + ' adicionado ao histórico!');
}

function salvarPessoa() {
  const nome = document.getElementById('input-pessoa-nome').value.trim();
  const fone = document.getElementById('input-pessoa-fone').value.trim().replace(/\D/g,'');
  if (!nome) { showToast('⚠️ Informe o nome'); return; }
  dados.pessoas.push({ id:dados.nextId++, nome, fone, pago:false });
  save(); fecharModal('modal-pessoa'); render(); renderGer();
  showToast('✅ '+nome+' adicionado!');
}


function editarFonePessoa(id) {
  const p = dados.pessoas.find(p=>p.id===id);
  if (!p) return;
  const fone = prompt('WhatsApp de ' + p.nome + ' (somente números com DDD):', p.fone||'');
  if (fone === null) return;
  p.fone = fone.replace(/\D/g,'');
  save(); renderGer();
  showToast('📱 Número de ' + p.nome + ' salvo!');
}

function togglePessoa(id) {
  if (dados.mesFechado) return;
  const p = dados.pessoas.find(p=>p.id===id);
  if (p) { p.pago=!p.pago; save(); render(); showToast(p.pago?'✅ '+p.nome+' pagou!':'↩️ '+p.nome+' desmarcado'); }
}

function adicionarFoto(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Comprimir para no máximo 200x200px e qualidade 60%
      const canvas = document.createElement('canvas');
      const MAX = 80;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.4);
      const p = dados.pessoas.find(p=>p.id===id);
      if (p) {
        p.foto = compressed;
        save(); render(); renderGer();
        showToast('📷 Foto de ' + p.nome + ' adicionada!');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removerFoto(id) {
  const p = dados.pessoas.find(p=>p.id===id);
  if (p) { delete p.foto; save(); render(); renderGer(); showToast('🗑 Foto removida'); }
}

function deletarPessoa(id) {
  const p = dados.pessoas.find(p=>p.id===id);
  if (!confirm('Remover "'+p.nome+'"?')) return;
  dados.pessoas = dados.pessoas.filter(p=>p.id!==id);
  save(); render(); renderGer(); showToast('🗑 '+p.nome+' removido');
}

// NOVO MÊS
function novoMes() {
  const total = dados.contas.reduce((s,c)=>s+c.valor,0);
  const cada = dados.pessoas.length>0 ? total/dados.pessoas.length : 0;
  const now = new Date();
  const mesNome = MESES_NOMES[now.getMonth()]+'/'+now.getFullYear();

  if (!confirm('Fechar o mês de '+mesNome+' e iniciar novo? Os pagamentos serão salvos no histórico.')) return;

  // Salvar no histórico
  dados.historico.push({
    mes: mesNome,
    total,
    cada,
    contas: dados.contas.map(c=>({...c})),
    // Salva pessoas SEM foto para economizar espaço — foto fica nos moradores
    pessoas: dados.pessoas.map(p=>({id:p.id, nome:p.nome, pago:p.pago, fone:p.fone||''})),
    data: new Date().toISOString()
  });

  // Zerar pagamentos, valores e iniciar novo mês
  dados.pessoas = dados.pessoas.map(p => ({...p, pago: false}));
  dados.contas = dados.contas.map(c => ({...c, pago: false, valor: 0}));
  dados.mesFechado = false;
  // Avança para o próximo mês
  const proximoMes = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  dados.mesAtual = { mes: proximoMes.getMonth(), ano: proximoMes.getFullYear() };

  save(); render();
  showToast('✅ Mês fechado! Novo mês iniciado — atualize os valores em Gerenciar.');
}

function resetarTudo() {
  if (!confirm('Apagar TODO o histórico? As contas e moradores atuais serão mantidos.')) return;
  dados.historico = [];
  dados.mesFechado = false;
  save();
  render();
  renderHistorico();
  showToast('✅ Histórico apagado!');
}


// TEMA
function toggleTheme() {
  const isDark = document.body.classList.contains('dark');
  if (isDark) {
    document.body.classList.remove('dark');
    document.body.classList.add('light');
    document.getElementById('theme-toggle').textContent = '🌙';
    localStorage.setItem('tema', 'light');
  } else {
    document.body.classList.remove('light');
    document.body.classList.add('dark');
    document.getElementById('theme-toggle').textContent = '☀️';
    localStorage.setItem('tema', 'dark');
  }
}

function initTema() {
  const tema = localStorage.getItem('tema') || 'light';
  document.body.classList.add(tema);
  document.getElementById('theme-toggle').textContent = tema === 'dark' ? '☀️' : '🌙';
}

// INIT
function initApp() {
  load();
  // Aplica fotos embutidas nos moradores automaticamente
  const embutidas = window.fotosEmbutidas || {};
  dados.pessoas = dados.pessoas.map(p => {
    if (!p.foto && embutidas[p.nome]) p.foto = embutidas[p.nome];
    return p;
  });
  window.dadosGlobais = dados;
  updateHeader();
  render();
  renderGer();
  initTema();
}

let appIniciado = false;
function iniciarAppUmaVez() {
  if (appIniciado) return;
  appIniciado = true;
  initApp();
}

if (window.fbReady) {
  iniciarAppUmaVez();
} else {
  document.addEventListener('firebase-ready', iniciarAppUmaVez);
  // Fallback - init after 5s even if Firebase fails
  setTimeout(function() {
    if (!appIniciado) { window.fbReady = true; iniciarAppUmaVez(); }
  }, 5000);
}
</script>
